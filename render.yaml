services:
  - type: web
    name: noura-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: starter          # $7/mo — always-on, no cold starts
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: GEMINI_API_KEY
        sync: false        # set manually in Render dashboard
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false        # paste your Supabase/Neon URL here
      - key: REDIS_URL
        sync: false        # paste your Upstash Redis URL here (optional)
      - key: ALLOWED_ORIGINS
        value: "https://noura-ai.vercel.app,https://acadai-frontend.onrender.com"
      - key: FRONTEND_URL
        value: "https://noura-ai.vercel.app"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false
